<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#08090D">
<title>Bacha Coffee — Champs-Élysées Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090D;--s1:#0F1118;--s2:#161922;--s3:#1E2230;--oc:#D4893F;--gd:#C9A85C;--cr:#F2EADE;--dm:#7A7580;--gn:#4FBF7E;--rd:#E85B5B;--bl:#5B9DE8;--pp:#A67BC5;--r:13px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito Sans',system-ui,sans-serif;background:var(--bg);color:var(--cr);min-height:100dvh;overflow-x:hidden;padding-bottom:80px}
::-webkit-scrollbar{display:none}
input::placeholder,select{color:var(--dm)}
input,select{font-family:inherit}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fu .3s ease}

/* Header */
.hdr{position:sticky;top:0;z-index:100;background:rgba(8,9,13,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,92,.08);padding:9px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr img{height:24px;object-fit:contain}
.hdr-r{display:flex;align-items:center;gap:6px}
.lang-btn{background:none;border:none;color:var(--gd);font-size:10px;cursor:pointer;font-weight:700;font-family:inherit}
.avatar{width:26px;height:26px;border-radius:50%;background:rgba(212,137,63,.15);border:1.5px solid var(--oc);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--oc)}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,9,13,.96);backdrop-filter:blur(20px);border-top:1px solid rgba(201,168,92,.06);display:flex;justify-content:space-around;padding:4px 0 max(4px,env(safe-area-inset-bottom));z-index:200;max-width:480px;margin:0 auto}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:1px;background:none;border:none;color:var(--dm);font-size:8px;font-weight:600;cursor:pointer;padding:4px 4px;font-family:inherit}
.nav-btn.act{color:var(--oc)}
.nav-btn span{font-size:17px}

/* Login */
.login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;z-index:9999}
.login .border{position:absolute;inset:20px;border:1px solid rgba(201,168,92,.1);border-radius:20px;pointer-events:none}
.login img{height:70px;margin-bottom:16px;object-fit:contain}
.login .sub{font-size:8px;letter-spacing:3px;color:var(--dm);text-transform:uppercase;margin-bottom:20px}
.login .langs{display:flex;gap:5px;margin-bottom:18px}
.login .langs button{padding:4px 12px;border-radius:50px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.login input{width:100%;max-width:270px;padding:11px 14px;background:var(--s1);border:1.5px solid var(--s3);border-radius:10px;color:var(--cr);font-size:14px;outline:none;margin-bottom:8px}
.login .btn{width:100%;max-width:270px;padding:12px;border:none;border-radius:10px;background:var(--oc);color:var(--bg);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.login .err{color:var(--rd);font-size:12px;margin-top:6px;display:none}

/* Cards */
.card{background:var(--s1);border-radius:var(--r);padding:12px;margin-bottom:8px;cursor:pointer;border:1px solid var(--s3);transition:transform .12s}
.card:active{transform:scale(.98)}
.label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--gd);text-transform:uppercase;margin-bottom:6px;font-family:'Cormorant Garamond',serif;font-size:12px}
.pill{display:inline-block;padding:6px 12px;border-radius:50px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--s3);background:var(--s1);color:var(--cr);font-family:inherit;flex-shrink:0}
.pill.act{background:var(--oc);color:var(--bg);border-color:var(--oc)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--oc);font-size:13px;font-weight:600;padding:12px 16px;cursor:pointer;font-family:inherit}
.prog-bar{height:3px;background:var(--s3);border-radius:3px;margin-top:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px}
.section{margin:0 16px 10px;background:var(--s1);border-radius:var(--r);padding:13px;border:1px solid var(--s3)}
.section-t{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.section-item{padding:6px 0;border-bottom:1px solid var(--s3);font-size:13px;line-height:1.55}
.section-item:last-child{border-bottom:none}
.chk-item{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--s2);cursor:pointer;transition:opacity .15s}
.chk-item.done{opacity:.3}
.chk-box{width:19px;height:19px;border-radius:5px;border:2px solid var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px;color:var(--bg);font-weight:800;transition:all .15s}
.chk-item.done .chk-box{background:var(--oc);border-color:var(--oc)}
.chk-label{font-size:13px;font-weight:500}
.chk-item.done .chk-label{text-decoration:line-through}
.chk-note{font-size:11px;color:var(--dm);margin-top:1px}
.input{width:100%;padding:9px 12px;background:var(--s1);border:1.5px solid var(--s3);border-radius:10px;color:var(--cr);font-size:13px;outline:none}
.sm-input{padding:8px 6px;background:var(--bg);border:1px solid var(--s3);border-radius:7px;color:var(--cr);font-size:11px;outline:none;width:100%}
.btn{width:100%;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.pills-row{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px}
.page{padding:8px 16px;max-width:480px;margin:0 auto}
.view{display:none}.view.act{display:block}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.coffee-item{display:flex;justify-content:space-between;align-items:center}
.coffee-item .nm{font-size:13px;font-weight:600}
.coffee-item .meta{font-size:10px;color:var(--dm);margin-top:1px}
.recipe-row{display:flex;gap:10px;align-items:center}
.recipe-row .em{font-size:26px}
.recipe-row .info{flex:1}
.recipe-row .info h3{font-size:13px;font-weight:700}
.recipe-row .info p{font-size:11px;color:var(--dm)}
.step{display:flex;gap:8px;margin-bottom:7px}
.step-n{width:18px;height:18px;border-radius:50%;background:rgba(212,137,63,.12);color:var(--oc);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.step-t{font-size:13px;line-height:1.5}
.ig-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--s3);font-size:13px}
.ig-row:last-child{border-bottom:none}
.ig-qty{color:var(--oc);font-weight:600;white-space:nowrap;margin-left:10px}

/* Coffee filters selects */
.flt-sel{width:100%;padding:8px 28px 8px 10px;background:var(--s1);border:1.5px solid var(--s3);border-radius:8px;color:var(--cr);font-size:12px;font-family:inherit;outline:none;-webkit-appearance:none;-moz-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--oc) 50%),linear-gradient(135deg,var(--oc) 50%,transparent 50%);background-position:calc(100% - 14px) 50%,calc(100% - 8px) 50%;background-size:6px 6px,6px 6px;background-repeat:no-repeat}
.flt-sel:focus{border-color:var(--oc)}

/* Out of stock styling */
.rupt-card{opacity:.45;position:relative}
.rupt-card .nm{text-decoration:line-through}
.rupt-badge{display:inline-block;padding:3px 8px;border-radius:50px;font-size:10px;font-weight:700;background:var(--rd);color:#fff;letter-spacing:.5px;text-transform:uppercase;margin-left:6px}
.rupt-toggle{background:transparent;border:1.5px solid var(--s3);color:var(--dm);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.rupt-toggle:hover{border-color:var(--rd);color:var(--rd)}
.rupt-toggle.on{background:var(--rd);border-color:var(--rd);color:#fff}
.rupt-banner{background:rgba(232,91,91,.12);border:1.5px solid rgba(232,91,91,.35);color:var(--rd);padding:10px 14px;border-radius:10px;font-weight:700;font-size:13px;text-align:center;margin-bottom:10px;letter-spacing:.5px}
</style>
</head>
<body>
<div id="app" style="max-width:480px;margin:0 auto">
<!-- Login -->
<div id="loginView" class="login">
<div class="border"></div>
<img id="loginLogo" src="https://bachacoffee.com/App_Data/Sitefinity/WebsiteTemplate/BachaCoffee/App_Themes/Bacha/images/logo.png" alt="Bacha Coffee" style="height:80px;border-radius:50%" onerror="this.style.display='none'">
<div class="sub">Champs-Élysées Companion</div>
<div class="langs" id="loginLangs"></div>
<input id="loginName" placeholder="Prénom">
<input id="loginPin" placeholder="Code PIN" type="password">
<button class="btn" style="background:var(--oc);color:var(--bg);max-width:270px" onclick="doLogin()">Se connecter</button>
<div class="err" id="loginErr">Code incorrect</div>
</div>

<!-- Header -->
<div class="hdr" id="mainHdr" style="display:none">
<img id="hdrLogo" src="https://bachacoffee.com/App_Data/Sitefinity/WebsiteTemplate/BachaCoffee/App_Themes/Bacha/images/logo-scroll.png" alt="Bacha" style="height:28px;border-radius:50%" onerror="this.outerHTML='<span class=serif style=color:var(--gd);font-size:14px;font-weight:700;letter-spacing:2px>BACHA COFFEE</span>'">
<div class="hdr-r">
<button class="lang-btn" onclick="cycleLang()" id="langBtn">FR</button>
<button class="lang-btn" onclick="shareApp()" title="Partager le lien" style="font-size:14px">🔗</button>
<div class="avatar" id="hdrAvatar">M</div>
</div>
</div>

<!-- Views -->
<div id="homeView" class="view"></div>
<div id="clView" class="view"></div>
<div id="recView" class="view"></div>
<div id="recDetailView" class="view"></div>
<div id="ficView" class="view"></div>
<div id="ficDetailView" class="view"></div>
<div id="cofView" class="view"></div>
<div id="cofDetailView" class="view"></div>
<div id="rankView" class="view"></div>
<div id="admView" class="view"></div>

<!-- Nav -->
<nav class="nav" id="mainNav" style="display:none">
<button class="nav-btn act" onclick="go('home')"><span>🏠</span>Accueil</button>
<button class="nav-btn" onclick="go('rec')"><span>🍸</span>Recettes</button>
<button class="nav-btn" onclick="go('fic')"><span>📋</span>Fiches</button>
<button class="nav-btn" onclick="go('cof')"><span>☕</span>Cafés</button>
<button class="nav-btn" onclick="go('rank')"><span>🏆</span>Classement</button>
<button class="nav-btn" onclick="go('adm')"><span>⚙️</span>Admin</button>
</nav>
</div>

function periodFilter(entries,period){
  if(period==="all")return entries.slice();
  var now=new Date();var todayStr=now.toISOString().slice(0,10);
  if(period==="today")return entries.filter(function(e){return e.date===todayStr});
  if(period==="yesterday"){var y=new Date(now);y.setDate(y.getDate()-1);var yStr=y.toISOString().slice(0,10);return entries.filter(function(e){return e.date===yStr})}
  if(period==="week"){var w=new Date(now);w.setDate(w.getDate()-7);var wStr=w.toISOString().slice(0,10);return entries.filter(function(e){return e.date>=wStr})}
  if(period==="month"){var m=new Date(now);m.setDate(m.getDate()-30);var mStr=m.toISOString().slice(0,10);return entries.filter(function(e){return e.date>=mStr})}
  return entries.slice();
}

function setOrderUnit(name,unit){var o=getOrderState();if(!o[name])o[name]={qty:"",unit:"kg"};o[name].unit=unit;saveOrderState(o);render()}
function copyOrder(){
  var o=getOrderState();
  var lines=[];
  ORDER_PRODUCTS.forEach(function(p){
    if(o[p]&&o[p].qty){
      lines.push(p+" : "+o[p].qty+" "+o[p].unit);
    }
  });
  if(!lines.length){alert("Aucun produit sélectionné !");return}
  var msg="Bonjour !\nVoici notre commande pour demain :\n"+lines.join("\n")+"\n\nMerci d'avance et très belle fin de journée à vous !";
  navigator.clipboard.writeText(msg).then(function(){
    var btn=document.getElementById("orderCopyBtn");
    if(btn){btn.textContent="✅ Copié !";btn.style.background="var(--gn)";setTimeout(function(){btn.textContent="📋 Copier la commande";btn.style.background="var(--oc)"},2000)}
  }).catch(function(){
    // Fallback
    var ta=document.createElement("textarea");ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    var btn=document.getElementById("orderCopyBtn");
    if(btn){btn.textContent="✅ Copié !";btn.style.background="var(--gn)";setTimeout(function(){btn.textContent="📋 Copier la commande";btn.style.background="var(--oc)"},2000)}
  });
}
function sendOrderWhatsApp(){
  var o=getOrderState();
  var lines=[];
  ORDER_PRODUCTS.forEach(function(p){
    if(o[p]&&o[p].qty){
      lines.push(p+" : "+o[p].qty+" "+o[p].unit);
    }
  });
  if(!lines.length){alert("Aucun produit sélectionné !");return}
  var msg="Bonjour !\nVoici notre commande pour demain :\n"+lines.join("\n")+"\n\nMerci d'avance et très belle fin de journée à vous !";
  window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}
function clearOrder(){var o={};saveOrderState(o);render()}

const SYNC_KEYS=["users","figs","tips","rupt","stock","rankBoutique","rankResto","vendeurs","chefs","chefsRang","lang","order"];
function shareApp(){
  var bundle={};
  SYNC_KEYS.forEach(function(k){var v=localStorage.getItem("bacha_"+k);if(v!==null)bundle[k]=v});
  var json=JSON.stringify(bundle);
  var b64=btoa(unescape(encodeURIComponent(json))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  var url=location.origin+location.pathname+"#sync="+b64;
  var sizeKB=(url.length/1024).toFixed(1);
  var title="Bacha Coffee — Champs-Élysées Companion";
  var msg="Lien de synchro Bacha ("+sizeKB+" KB) — toutes les données seront importées sur l'autre appareil.";
  if(url.length>7500){if(!confirm("⚠️ Lien volumineux ("+sizeKB+" KB). Certains navigateurs/messageries peuvent le tronquer. Continuer ?"))return}
  if(navigator.share){navigator.share({title:title,url:url,text:msg}).catch(function(){})}
  else if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){alert("Lien de synchro copié ("+sizeKB+" KB) !\n\nColle-le sur l'autre appareil pour tout importer.")})}
  else{prompt("Copiez le lien ("+sizeKB+" KB) :",url)}
}
function checkSyncImport(){
  if(!location.hash||location.hash.indexOf("#sync=")!==0)return;
  var b64=location.hash.slice(6).replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length%4)b64+='=';
  try{
    var bundle=JSON.parse(decodeURIComponent(escape(atob(b64))));
    var keys=Object.keys(bundle);
    if(!keys.length){history.replaceState(null,"",location.pathname);return}
    if(!confirm("📥 Importer les données partagées ("+keys.length+" éléments) ?\n\n⚠️ Tes données actuelles seront ÉCRASÉES.")){history.replaceState(null,"",location.pathname);return}
    keys.forEach(function(k){if(SYNC_KEYS.indexOf(k)>=0)localStorage.setItem("bacha_"+k,bundle[k])});
    history.replaceState(null,"",location.pathname);
    alert("✅ Synchronisation réussie !");
    location.reload();
  }catch(e){alert("❌ Lien de synchro invalide ou corrompu.");history.replaceState(null,"",location.pathname)}
}

      h+=`<button class="btn" style="background:rgba(232,91,91,.12);color:var(--rd);padding:10px 14px;font-size:12px;font-weight:700;border:1.5px solid rgba(232,91,91,.3);border-radius:10px" onclick="clearOrder()">🗑️</button>`;
      h+=`</div>`;
      h+=`</div>`;
    }

    // Lang
    h+=`<div style="display:flex;gap:5px;margin-top:14px">`;
    ["fr","en","es"].forEach(l=>{h+=`<button class="pill${state.lang===l?" act":""}" style="${state.lang===l?"background:var(--gd);border-color:var(--gd)":""}" onclick="state.lang='${l}';document.getElementById('langBtn').textContent='${l.toUpperCase()}';render()">${l.toUpperCase()}</button>`});
    h+=`</div>`;
    h+=`<button class="btn" style="background:rgba(232,91,91,.12);color:var(--rd);border:1px solid rgba(232,91,91,.2);margin-top:14px" onclick="state.user=null;document.getElementById('loginView').style.display='flex';document.getElementById('mainHdr').style.display='none';document.getElementById('mainNav').style.display='none'">${t("logout")}</button>`;
    h+=`</div>`;el.innerHTML=h;
  }
}

function addTip(){
  let inp=document.getElementById("tip-amt");
  let v=parseFloat(inp.value);
  if(!v||v<=0)return;
  let now=new Date();
  let time=now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  let date=now.toLocaleDateString("fr-FR");
  state.tips=state.tips||[];
  state.tips.push({date,amt:v,time,ts:now.getTime()});
  save("tips",state.tips);
  inp.value="";
  render();
}
function delTip(i){
  if(!state.tips||!state.tips[i])return;
  state.tips.splice(i,1);
  save("tips",state.tips);
  render();
}
function delFig(i){
  if(!state.figs||!state.figs[i])return;
  state.figs.splice(i,1);
  save("figs",state.figs);
  render();
}

function delUser(i){state.users.splice(i,1);save("users",state.users);render()}

}

// Système de sauvegarde LocalStorage
function save(key, data) {
    localStorage.setItem('bacha_' + key, JSON.stringify(data));
}

function loadAll() {
    // Chacune isolée: une panne de parsing ne doit pas casser le démarrage
    try{var sU=localStorage.getItem('bacha_users'); if(sU){var u=JSON.parse(sU); if(Array.isArray(u)&&u.length) state.users=u;}}catch(e){console.warn('users:',e);} 
    try{var sF=localStorage.getItem('bacha_figs'); if(sF){var f=JSON.parse(sF); if(Array.isArray(f)) state.figs=f;}}catch(e){console.warn('figs:',e);} 
    try{var sT=localStorage.getItem('bacha_tips'); if(sT){var t=JSON.parse(sT); if(Array.isArray(t)) state.tips=t;}}catch(e){console.warn('tips:',e);} 
    try{var sR=localStorage.getItem('bacha_rupt'); if(sR){var r=JSON.parse(sR); if(Array.isArray(r)) state.rupt=r;}}catch(e){console.warn('rupt:',e);}
    try{var sK=localStorage.getItem('bacha_stock'); if(sK){var k=JSON.parse(sK); if(k&&typeof k==='object') state.stock=k;}}catch(e){console.warn('stock:',e);}
    try{var sRB=localStorage.getItem('bacha_rankBoutique'); if(sRB){var rb=JSON.parse(sRB); if(rb&&typeof rb==='object') state.rankBoutique=rb;}}catch(e){console.warn('rankB:',e);}
    try{var sRR=localStorage.getItem('bacha_rankResto'); if(sRR){var rr=JSON.parse(sRR); if(rr&&typeof rr==='object') state.rankResto=rr;}}catch(e){console.warn('rankR:',e);}
    try{var sV=localStorage.getItem('bacha_vendeurs'); if(sV){var vv=JSON.parse(sV); if(Array.isArray(vv)) state.vendeurs=vv;}}catch(e){console.warn('vendeurs:',e);}
    try{var sCh=localStorage.getItem('bacha_chefs'); if(sCh){var ch=JSON.parse(sCh); if(Array.isArray(ch)) state.chefs=ch;}}catch(e){console.warn('chefs:',e);}
    try{var sCR=localStorage.getItem('bacha_chefsRang'); if(sCR){var cr=JSON.parse(sCR); if(Array.isArray(cr)&&!state.chefs) state.chefs=cr;}}catch(e){console.warn('chefsRang:',e);}
    if(!state.vendeurs)state.vendeurs=VENDEURS_BOUTIQUE.slice();
    if(!state.chefs)state.chefs=[];
    migrateRank("rankBoutique");
    migrateRank("rankResto");
    try{var sL=localStorage.getItem('bacha_lang'); if(sL){var l; try{l=JSON.parse(sL);}catch(_){l=sL;} if(l==='fr'||l==='en'||l==='es') state.lang=l;}}catch(e){console.warn('lang:',e);}
    // Garantir qu'il y a toujours un admin par défaut (Mathis/1910) pour éviter un lockout
    var hasMathis = state.users && state.users.some(function(x){return x && x.name && x.name.toLowerCase()==='mathis' && x.pin==='1910';});
    if(!hasMathis){ state.users = (state.users||[]).filter(function(x){return x && x.name;}); state.users.unshift({name:'Mathis',pin:'1910',role:'admin'}); }
}

// Remplacer l'init original par un chargement
window.addEventListener('DOMContentLoaded', () => {
    try { checkSyncImport(); } catch(e){ console.error('sync import failed:', e); }
    try { loadAll(); } catch(e){ console.error('loadAll failed:', e); }
    try { render(); } catch(e){ console.error('render failed:', e); }
});
// Fallback: si DOMContentLoaded a déjà été déclenché
if(document.readyState!=='loading'){ try{ loadAll(); render(); }catch(e){ console.error('late init:', e); } }
